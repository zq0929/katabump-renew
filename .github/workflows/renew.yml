name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start Proxy (sing-box)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "PROXY_URL not set, skipping sing-box setup."
            exit 0
          fi
          SINGBOX_VER="1.12.2"
          GH_URL="https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          if ! wget -q --timeout=10 "$GH_URL"; then
            echo "Official source failed, trying mirror..."
            if ! wget -q --timeout=10 "https://ghp.ci/https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"; then
              echo "❌ Failed to download sing-box from all sources"
              exit 1
            fi
          fi
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          python proxy_handler.py
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          proxy_ready=0
          for i in $(seq 1 15); do
            if curl -sf --proxy http://127.0.0.1:8080 http://cloudflare.com/cdn-cgi/trace > /dev/null 2>&1; then
              echo "✅ sing-box proxy ready."
              proxy_ready=1
              break
            fi
            echo "Waiting for sing-box... ($i/15)"
            sleep 1
          done
          if [ $proxy_ready -eq 0 ]; then
            echo "❌ sing-box proxy failed to start after 15 seconds"
            echo "=== sing-box log ==="
            cat singbox.log
            exit 1
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: http://127.0.0.1:8080
          HTTPS_PROXY: http://127.0.0.1:8080
          NO_PROXY: localhost,127.0.0.1
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Cleanup
        if: always()
        run: |
          pkill -f sing-box 2>/dev/null || true
          pkill -f chrome 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
