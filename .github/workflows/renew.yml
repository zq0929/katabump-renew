name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *'  # 每日 UTC 0 点执行（北京时间 8 点）
  workflow_dispatch:     # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Python
        uses: actions/setup-python@v5  # 升级到 v5 稳定版
        with:
          python-version: '3.11'

      - name: Start Proxy (sing-box)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "PROXY_URL not set, skipping sing-box setup."
            exit 0
          fi
          SINGBOX_VER="1.12.2"
          # 修复：使用国内 GitHub 镜像下载（解决文档1的境外访问失败）
          if ! wget -q "https://ghp.ci/https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"; then
            echo "❌ Failed to download sing-box"
            exit 1
          fi
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          python proxy_handler.py
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          
          # 修复：增加代理启动失败检测和日志输出（解决文档2的127.0.0.1:8080无法访问）
          proxy_ready=0
          for i in $(seq 1 15); do  # 延长等待时间到15秒
            if curl -sf --proxy http://127.0.0.1:8080 http://cloudflare.com/cdn-cgi/trace > /dev/null 2>&1; then
              echo "✅ sing-box proxy ready."
              proxy_ready=1
              break
            fi
            echo "Waiting for sing-box... ($i/15)"
            sleep 1
          done
          if [ $proxy_ready -eq 0 ]; then
            echo "❌ sing-box proxy failed to start after 15 seconds"
            echo "=== sing-box log ==="
            cat singbox.log
            exit 1
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          npm install  # 用 npm ci 替代 npm install 确保依赖版本一致

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps  # 合并依赖安装步骤

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: http://127.0.0.1:8080  # 统一代理地址
          HTTPS_PROXY: http://127.0.0.1:8080
          NO_PROXY: localhost,127.0.0.1
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Cleanup
        if: always()
        run: |
          pkill -f sing-box 2>/dev/null || true
          pkill -f chrome 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7  # 新增：截图保留7天自动清理
